<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - Acerte o Número</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Input para digitar o número -->
        <input type="number" id="chute" placeholder="?" min="1" max="100">

        <!-- Área dos botões de ação -->
        <div class="button-group">
            <button id="btn-chutar" onclick="verificarChute()">Chutar</button>
            <button id="btn-novo" onclick="reiniciarJogo()" disabled>Novo jogo</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
