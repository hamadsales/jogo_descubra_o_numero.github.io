<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - Acerte o Número</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!--Utilizando Single Page Application (SPA)-->
    <div id="tela-inicial">
        <div class="game-container">
            <img id="header" src="header.png">
            <div class="button-group">
                <button id="btn-chutar" onclick="easy()">Fácil</button>
                <button id="btn-novo" onclick="normal()">Médio</button>
                <button id="btn-chutar" onclick="hard()">Difícil</button>
            </div>
        </div>
    </div>
    <div id="tela-jogo" style="display: none;"> <!--esconde o display-->
        <div class="game-container">
            <img src="header.png">
            <img id="win" style = 'display: none;'></img>
            <!-- Input para digitar o número -->
            <input type="number" id="chute" placeholder="?">

            <!-- Área dos botões de ação -->
            <div class="button-group">
                <button id="btn-chutar" onclick="verificarChute()">Chutar</button>
                <button id="btn-novo" onclick="reiniciarJogo()" >Novo jogo</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
